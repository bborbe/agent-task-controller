apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: 'agent-task-controller-{{ "VAULT" | env }}'
  namespace: '{{ "NAMESPACE" | env }}'
data:
  sentry-dsn: '{{ "SENTRY_DSN_KEY" | env | teamvaultUrl | base64 }}'
  gateway-secret: '{{ "GATEWAY_SECRET_TVID" | env | teamvaultPassword | base64 }}'
